<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Generador de documentos</title>

<style>

body{
    font-family: Arial;
    margin:40px;
}

input{
    width:300px;
    padding:8px;
    margin:5px;
}

textarea{
    width:700px;
    height:250px;
    padding:8px;
    margin:5px;
    font-family:Arial;
}

button{
    padding:10px 20px;
    background:#0066cc;
    color:white;
    border:none;
    cursor:pointer;
}

</style>

</head>

<body>

<h1>Generador de documentos</h1>

<form method="POST">

{% for variable in variables %}

<label>{{ variable }}</label>

<br>

{% if variable|lower == "justificacion" %}

<textarea
name="{{ variable }}"
rows="10"
cols="80"
required
></textarea>

{% else %}

<input
type="text"
name="{{ variable }}"
required
>

{% endif %}
<br><br>

{% endfor %}

<button type="submit">
Generar documento
</button>

</form>

</body>

</html>
