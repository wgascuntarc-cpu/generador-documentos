<!DOCTYPE html>
<html>
<head>
    <title>Generador de Documentos</title>
</head>

<body>

<h2>Generador de Documentos</h2>

<form method="POST">

    <label>Correo:</label><br>
    <input type="email" name="correo" required>
    <br><br>

    {% for variable in variables %}
        <label>{{ variable }}</label><br>
        <input type="text" name="{{ variable }}" required>
        <br><br>
    {% endfor %}

    <button type="submit">Generar Documento</button>

</form>

</body>
</html>
